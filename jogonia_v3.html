<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JOGONÍA v3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
*{margin:0;padding:0;box-sizing:border-box;image-rendering:pixelated;}
:root{
  --gold:#ffd700;--gold2:#7a5a00;--green:#00ff41;--green2:#003300;
  --red:#ff3333;--blue:#44aaff;--orange:#ff8800;--purple:#aa44ff;
  --bg:#090909;--panel:#111;--border:#1e1e1e;--text:#e0ddd0;
  --shadow:2px 2px 0 #000;--tile:34px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Press Start 2P',monospace;color:var(--text);}

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#111;}
::-webkit-scrollbar-thumb{background:var(--gold2);}

/* ══ TITLE ══ */
#title{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:14px;}
.t-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,#0a1a00 0%,#000 70%);}
.t-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,255,65,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,65,.05) 1px,transparent 1px);background-size:30px 30px;}
.t-h1{font-size:clamp(18px,5vw,42px);color:var(--gold);text-shadow:0 0 30px var(--gold),4px 4px 0 var(--gold2);letter-spacing:6px;z-index:1;animation:glow 2s ease-in-out infinite;}
.t-h2{font-size:clamp(7px,1.8vw,11px);color:var(--green);letter-spacing:3px;z-index:1;}
.t-info{font-family:'VT323',monospace;font-size:clamp(15px,3vw,20px);color:#999;z-index:1;text-align:center;max-width:420px;line-height:1.7;padding:0 20px;}
.t-btns{display:flex;gap:12px;z-index:1;flex-wrap:wrap;justify-content:center;}
.t-btn{background:var(--gold);color:#000;border:3px solid #fff;padding:10px 22px;font-family:'Press Start 2P',monospace;font-size:9px;cursor:pointer;box-shadow:4px 4px 0 var(--gold2);transition:.1s;}
.t-btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--gold2);}
.t-btn.sec{background:#111;color:var(--gold);border-color:var(--gold);}
@keyframes glow{0%,100%{text-shadow:0 0 20px var(--gold),4px 4px 0 var(--gold2);}50%{text-shadow:0 0 60px var(--gold),0 0 100px #ffa500,4px 4px 0 var(--gold2);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
@keyframes fadein{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* ══ GAME ══ */
#game{display:none;flex-direction:column;width:100vw;height:100vh;}

/* ══ HUD ══ */
#hud{display:flex;align-items:stretch;background:#080808;border-bottom:2px solid var(--gold2);flex-shrink:0;overflow-x:auto;min-height:52px;}
.hud-cell{display:flex;flex-direction:column;justify-content:center;padding:4px 10px;border-right:1px solid #1e1e1e;min-width:0;flex-shrink:0;}
.hud-lbl{font-size:5px;color:#555;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;}
.hud-val{font-size:9px;color:var(--gold);text-shadow:var(--shadow);white-space:nowrap;margin-top:2px;}
.hud-val.g{color:var(--green);}
.hud-val.r{color:var(--red);}
.hud-val.b{color:var(--blue);}
.hud-val.o{color:var(--orange);}
.hud-val.p{color:var(--purple);}
#wanted-bar{display:flex;gap:2px;margin-top:2px;}
.wstar{font-size:11px;opacity:.2;transition:.3s;}
.wstar.on{opacity:1;filter:drop-shadow(0 0 4px #ff0);}
.hud-speed{display:flex;gap:4px;align-items:center;margin-top:2px;}
.spd-btn{background:#1a1a1a;border:1px solid #333;color:#888;font-family:'Press Start 2P',monospace;font-size:6px;padding:2px 5px;cursor:pointer;}
.spd-btn.active{background:var(--gold2);border-color:var(--gold);color:var(--gold);}

/* ══ MAP ══ */
#map-wrap{position:relative;flex:1;overflow:hidden;background:#1a2a1a;}
#gc{display:block;}

/* ══ BOTTOM BAR ══ */
#bot{display:flex;gap:5px;padding:6px 8px;background:#080808;border-top:2px solid var(--gold2);flex-shrink:0;flex-wrap:wrap;align-items:center;}
.bb{background:#0d0d0d;border:2px solid var(--gold2);color:var(--gold);font-family:'Press Start 2P',monospace;font-size:7px;padding:6px 10px;cursor:pointer;transition:.12s;box-shadow:2px 2px 0 #000;white-space:nowrap;flex-shrink:0;}
.bb:hover{background:var(--gold);color:#000;border-color:var(--gold);}
.bb:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #000;}
.bb:disabled{opacity:.3;cursor:not-allowed;}
.bb.g{border-color:#004400;color:var(--green);}
.bb.g:hover{background:var(--green);color:#000;border-color:var(--green);}
.bb.r{border-color:#440000;color:var(--red);}
.bb.r:hover{background:var(--red);color:#fff;border-color:var(--red);}
.bb.b{border-color:#002244;color:var(--blue);}
.bb.b:hover{background:var(--blue);color:#000;border-color:var(--blue);}
.bb.p{border-color:#220044;color:var(--purple);}
.bb.p:hover{background:var(--purple);color:#fff;border-color:var(--purple);}

/* ══ MODAL ══ */
#mo{display:none;position:fixed;inset:0;background:#000d;z-index:100;align-items:center;justify-content:center;padding:14px;}
#mo.open{display:flex;}
#mbox{background:#090909;border:3px solid var(--gold2);max-width:520px;width:100%;max-height:88vh;display:flex;flex-direction:column;box-shadow:6px 6px 0 #000,0 0 30px #ffd70022;animation:fadein .15s ease;}
#mtop{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #1e1e1e;flex-shrink:0;}
#mtitle{font-size:9px;color:var(--gold);}
#mclose{background:none;border:1px solid #444;color:#888;font-size:14px;cursor:pointer;padding:2px 7px;font-family:monospace;}
#mclose:hover{border-color:var(--red);color:var(--red);}
#mscroll{flex:1;overflow-y:auto;padding:12px 14px;}
#mcont{font-family:'VT323',monospace;font-size:19px;line-height:1.55;}
#mload{font-family:'VT323',monospace;font-size:22px;color:var(--green);animation:blink .5s step-end infinite;display:none;padding:6px 0;}
#mbtns{display:flex;gap:7px;padding:10px 14px;border-top:1px solid #1e1e1e;flex-wrap:wrap;flex-shrink:0;}

/* ══ OPTION BTN ══ */
.opt{display:block;width:100%;text-align:left;background:#0e0e0e;border:1px solid #252525;color:var(--text);font-family:'VT323',monospace;font-size:19px;padding:9px 12px;cursor:pointer;margin-bottom:5px;transition:.12s;line-height:1.3;}
.opt:hover{border-color:var(--gold);color:var(--gold);background:#141400;}
.opt:disabled{opacity:.3;cursor:not-allowed;}
.opt.g:hover{border-color:var(--green);color:var(--green);background:#001400;}
.opt.r:hover{border-color:var(--red);color:var(--red);background:#140000;}
.opt.b:hover{border-color:var(--blue);color:var(--blue);background:#000a14;}
.opt.p:hover{border-color:var(--purple);color:var(--purple);background:#08001a;}

/* ══ TABLE ══ */
.tbl{width:100%;border-collapse:collapse;font-family:'VT323',monospace;font-size:18px;}
.tbl th{color:#555;font-size:13px;text-align:left;padding:4px 6px;border-bottom:1px solid #1e1e1e;font-family:'Press Start 2P',monospace;}
.tbl td{padding:5px 6px;border-bottom:1px solid #111;}
.tbl tr:hover td{background:#0f0f0f;}
.up{color:#00ff88;}.dn{color:var(--red);}.coin{color:var(--gold);}

/* ══ TOAST NOTIFICATION ══ */
#toast{position:fixed;top:62px;left:50%;transform:translateX(-50%);background:#0d0d0d;border:2px solid var(--green);color:var(--green);font-family:'VT323',monospace;font-size:19px;padding:6px 16px;z-index:200;pointer-events:none;opacity:0;transition:opacity .3s;text-align:center;max-width:92vw;white-space:nowrap;}
#toast.show{opacity:1;}
#toast.r{border-color:var(--red);color:var(--red);}
#toast.g{border-color:var(--gold);color:var(--gold);}
#toast.b{border-color:var(--blue);color:var(--blue);}
#toast.o{border-color:var(--orange);color:var(--orange);}

/* ══ EVENT BANNER ══ */
#evt-banner{position:fixed;bottom:80px;right:12px;background:#0d0d0d;border:2px solid var(--orange);max-width:260px;padding:10px 12px;z-index:150;animation:fadein .3s ease;display:none;}
#evt-banner.show{display:block;}
.evt-title{font-size:8px;color:var(--orange);margin-bottom:5px;}
.evt-body{font-family:'VT323',monospace;font-size:16px;line-height:1.4;}
.evt-close{font-size:7px;cursor:pointer;color:#555;margin-top:6px;display:block;}
.evt-close:hover{color:var(--red);}

/* ══ MOBILE ══ */
@media(max-width:600px){
  .hud-cell{padding:3px 7px;}
  .hud-val{font-size:8px;}
  .hud-lbl{font-size:4px;}
  .bb{font-size:6px;padding:5px 7px;}
  #bot{gap:4px;padding:5px 6px;}
  .mob-hide{display:none;}
}
@media(max-width:380px){
  .t-h1{font-size:16px;}
  .bb{font-size:5px;padding:4px 6px;}
}
</style>
</head>

<div id="title">

  <div class="t-grid"></div>
  <div class="t-h1" id="tit-main">JOGONÍA</div>
  <div class="t-h2" id="tit-sub">Del Sofá al Bitcoin</div>

  <div class="t-btns">
    <button class="t-btn" id="btn-new" onclick="newGame()">▶ EMPEZAR</button>
    <button class="t-btn sec" id="btn-load" onclick="loadAndStart()" style="display:none">📂 CONTINUAR</button>
    <button class="t-btn sec" onclick="toggleLang()">🌐 EN/ES</button>
  </div>
  <div style="font-family:'VT323',monospace;font-size:14px;color:#333;z-index:1;margin-top:4px" id="save-info"></div>
</div>

<!-- ════════ GAME ════════ -->
<div id="game">
  <div id="hud">
    <div class="hud-cell">
      <div class="hud-lbl" data-t="date">Fecha</div>
      <div class="hud-val o" id="h-date">Ene 2008</div>
    </div>
    <div class="hud-cell">
      <div class="hud-lbl" data-t="money">Dinero</div>
      <div class="hud-val" id="h-money">€50</div>
    </div>
    <div class="hud-cell mob-hide">
      <div class="hud-lbl">Bitcoin</div>
      <div class="hud-val b" id="h-btc">0 ₿</div>
    </div>
    <div class="hud-cell mob-hide">
      <div class="hud-lbl">ETH</div>
      <div class="hud-val b" id="h-eth">0 Ξ</div>
    </div>
    <div class="hud-cell mob-hide">
      <div class="hud-lbl">Oro</div>
      <div class="hud-val" id="h-gold">0 oz</div>
    </div>
    <div class="hud-cell mob-hide">
      <div class="hud-lbl">S&P500</div>
      <div class="hud-val p" id="h-sp500">0</div>
    </div>
    <div class="hud-cell">
      <div class="hud-lbl" data-t="worth">Patrimonio</div>
      <div class="hud-val g" id="h-worth">€50</div>
    </div>
    <div class="hud-cell mob-hide">
      <div class="hud-lbl" data-t="houses">Casas</div>
      <div class="hud-val g" id="h-houses">1/7</div>
    </div>
    <div class="hud-cell">
      <div class="hud-lbl" data-t="wanted">Buscado</div>
      <div id="wanted-bar">
        <span class="wstar" id="s1">⭐</span><span class="wstar" id="s2">⭐</span>
        <span class="wstar" id="s3">⭐</span><span class="wstar" id="s4">⭐</span><span class="wstar" id="s5">⭐</span>
      </div>
    </div>
    <div class="hud-cell mob-hide">
      <div class="hud-lbl" data-t="speed">Velocidad</div>
      <div class="hud-speed">
        <button class="spd-btn active" id="spd1" onclick="setSpeed(1)">1x</button>
        <button class="spd-btn" id="spd2" onclick="setSpeed(7)">7x</button>
        <button class="spd-btn" id="spd3" onclick="setSpeed(30)">30x</button>
        <button class="spd-btn" id="spd0" onclick="togglePause()">⏸</button>
      </div>
    </div>
  </div>

  <div id="map-wrap"><canvas id="gc"></canvas></div>

  <div id="bot">
    <button class="bb g" onclick="doWork()">⚒ <span data-t="work">Trabajar</span></button>
    <button class="bb b" onclick="doMarket()">📊 <span data-t="market">Mercado</span></button>
    <button class="bb r" onclick="doCrime()">🔪 <span data-t="crime">Crimen</span></button>
    <button class="bb" onclick="doHouses()">🏘 <span data-t="houses2">Casas</span></button>
    <button class="bb p mob-hide" onclick="doShop()">🛒 <span data-t="shop">Tienda</span></button>
    <button class="bb mob-hide" onclick="doNews()">📰 <span data-t="news">Noticias</span></button>
    <button class="bb mob-hide" onclick="doSettings()">⚙ <span data-t="settings">Ajustes</span></button>
    <button class="bb g" onclick="interact()">E <span data-t="enter">Entrar</span></button>
  </div>
</div>

<!-- ════════ MODAL ════════ -->
<div id="mo">
  <div id="mbox">
    <div id="mtop">
      <div id="mtitle">—</div>
      <button id="mclose" onclick="closeModal()">✕</button>
    </div>
    <div id="mscroll">
      <div id="mcont"></div>
      <div id="mload">▌ Generando...</div>
    </div>
    <div id="mbtns"></div>
  </div>
</div>

<div id="toast"></div>
<div id="evt-banner">

  <div class="evt-body" id="evt-body">—</div>
  <span class="evt-close" onclick="hideBanner()">✕ Cerrar</span>
</div>

let lang='es';
function t(k){return T[lang][k]||T.es[k]||k;}
function applyLang(){
  document.querySelectorAll('[data-t]').forEach(el=>{
    const k=el.getAttribute('data-t'); el.textContent=t(k);
  });
  document.getElementById('tit-sub').textContent=lang==='es'?'Del Sofá al Bitcoin':'From Couch to Bitcoin';
  document.getElementById('tit-desc').textContent=lang==='es'?
    'Año 2008. €50 en el bolsillo.\nTrabaja, invierte y compra todo el pueblo.':
    'Year 2008. €50 in your pocket.\nWork, invest and buy the whole town.';
  document.getElementById('btn-new').textContent=lang==='es'?'▶ EMPEZAR':'▶ START';
  const bl=document.getElementById('btn-load');
  if(bl.style.display!=='none') bl.textContent=lang==='es'?'📂 CONTINUAR':'📂 CONTINUE';
}
function toggleLang(){lang=lang==='es'?'en':'es';applyLang();}

function getPrice(asset,year,month){
  const pts=PRICE_PTS[asset];
  if(!pts)return 0;
  // Convert date to number
  const val=year*12+month;
  let lo=null,hi=null;
  for(const p of pts){
    const v=p[0]*12+p[1];
    if(v<=val)lo=p;
    if(v>=val&&!hi)hi=p;
  }
  if(!lo)return 0;
  if(!hi||hi===lo)return lo[2];
  const t=(val-(lo[0]*12+lo[1]))/((hi[0]*12+hi[1])-(lo[0]*12+lo[1]));
  return lo[2]+(hi[2]-lo[2])*t;
}

function assetAvailable(asset,year,month){
  if(asset==='btc')return year>2009||(year===2009&&month>=10);
  if(asset==='eth')return year>2015||(year===2015&&month>=7);
  if(asset==='solana')return year>=2020;
  if(asset==='tesla')return year>=2010;
  if(asset==='apple')return true;
  return true;
}

const TILE=34,MW=30,MH=24;
let canvas,ctx2d,camX=0,camY=0;
let pl={x:7,y:8,anim:0};
let keys={};
let lastT=0,moveDel=0;
let gameRunning=false;

const MAP=buildMap();
function buildMap(){
  const m=[];
  for(let y=0;y<MH;y++){
    m[y]=[];
    for(let x=0;x<MW;x++){
      if(x===0||y===0||x===MW-1||y===MH-1){m[y][x]=1;continue;}
      const r=Math.random();
      if(r<.08)m[y][x]=3;
      else if(r<.11)m[y][x]=4;
      else if(r<.16)m[y][x]=2;
      else m[y][x]=0;
    }
  }
  HOUSES.forEach(h=>{
    const cx=Math.min(h.mx,MW-2),cy=Math.min(h.my,MH-2);
    m[cy][cx]=5;
    for(let i=1;i<5;i++){if(cy+i<MH-1)m[cy+i][cx]=2;if(cx+i<MW-1)m[cy][cx+i]=2;}
  });
  return m;
}
function solid(x,y){if(x<0||x>=MW||y<0||y>=MH)return true;return MAP[y][x]===1||MAP[y][x]===3||MAP[y][x]===5;}

function resize(){
  const w=document.getElementById('map-wrap');
  canvas.width=w.clientWidth;canvas.height=w.clientHeight;
}

function draw(dt){
  const W=canvas.width,H=canvas.height;
  ctx2d.clearRect(0,0,W,H);
  const tx=pl.x*TILE-W/2+TILE/2,ty=pl.y*TILE-H/2+TILE/2;
  camX+=(tx-camX)*.16;camY+=(ty-camY)*.16;
  const ox=-Math.round(camX),oy=-Math.round(camY);
  for(let y=0;y<MH;y++)for(let x=0;x<MW;x++){
    const px=x*TILE+ox,py=y*TILE+oy;
    if(px<-TILE||px>W||py<-TILE||py>H)continue;
    drawTile(px,py,MAP[y][x],x,y);
  }
  HOUSES.forEach(h=>{
    const cx=Math.min(h.mx,MW-2),cy=Math.min(h.my,MH-2);
    const px=cx*TILE+ox,py=cy*TILE+oy;
    if(px<-80||px>W+60||py<-80||py>H+60)return;
    drawHouse(px,py,h,G.ownedHouses.includes(h.id));
  });
  if(G.wanted>=3){
    const s=Date.now()/1000;
    drawCop((Math.sin(s*.7)*5+pl.x|0)*TILE+ox,(Math.cos(s*.5)*5+pl.y|0)*TILE+oy);
  }
  pl.anim+=dt;drawPlayer(pl.x*TILE+ox,pl.y*TILE+oy);
  HOUSES.forEach(h=>{
    const cx=Math.min(h.mx,MW-2),cy=Math.min(h.my,MH-2);
    if(Math.abs(pl.x-cx)<=1&&Math.abs(pl.y-cy)<=1){
      const px=cx*TILE+ox+TILE/2,py=cy*TILE+oy-6;
      ctx2d.fillStyle='rgba(0,0,0,.8)';ctx2d.fillRect(px-60,py-18,120,22);
      ctx2d.fillStyle=G.ownedHouses.includes(h.id)?'#ffd700':'#00ff41';
      ctx2d.font='7px "Press Start 2P"';ctx2d.textAlign='center';
      ctx2d.fillText(h.emoji+' '+hName(h).substring(0,12),px,py-2);ctx2d.textAlign='left';
    }
  });
  // Paused overlay
  if(G.paused){
    ctx2d.fillStyle='rgba(0,0,0,.5)';ctx2d.fillRect(0,0,W,H);
    ctx2d.fillStyle=G.lang==='es'?'#ffd700':'#ffd700';
    ctx2d.font='14px "Press Start 2P"';ctx2d.textAlign='center';
    ctx2d.fillText(t('paused'),W/2,H/2);ctx2d.textAlign='left';
  }
}

function drawTile(px,py,t2,x,y){
  const c=ctx2d;
  if(t2===0){c.fillStyle='#2a5a2a';c.fillRect(px,py,TILE,TILE);c.fillStyle='#367a36';c.fillRect(px+4,py+TILE-10,3,8);c.fillRect(px+16,py+TILE-12,3,10);c.fillRect(px+27,py+TILE-9,3,7);}
  else if(t2===1){const w=Math.sin(Date.now()*.002+x+y*.5)*3;c.fillStyle='#1a4a8a';c.fillRect(px,py,TILE,TILE);c.fillStyle='#2a6ab0';c.fillRect(px,py+8+w,TILE,5);c.fillRect(px,py+20+w,TILE,5);}
  else if(t2===2){c.fillStyle='#7a6040';c.fillRect(px,py,TILE,TILE);c.fillStyle='#8a7050';c.fillRect(px+3,py+TILE/2-2,TILE-6,4);}
  else if(t2===3){c.fillStyle='#3a2010';c.fillRect(px+TILE/2-4,py+TILE/2,8,TILE/2);c.fillStyle='#1a4a10';c.beginPath();c.arc(px+TILE/2,py+TILE*.36,TILE*.42,0,Math.PI*2);c.fill();c.fillStyle='#2a6a20';c.beginPath();c.arc(px+TILE/2,py+TILE*.3,TILE*.28,0,Math.PI*2);c.fill();}
  else if(t2===4){c.fillStyle='#2a5a2a';c.fillRect(px,py,TILE,TILE);c.fillStyle='#ff88cc';c.fillRect(px+TILE/2-4,py+TILE/2-4,8,8);}
  else{c.fillStyle='#2a4a2a';c.fillRect(px,py,TILE,TILE);}
}

function drawHouse(px,py,h,owned){
  const S=TILE,c=ctx2d;

  c.fillStyle=owned?'#ffffa0':'#223';
  c.fillRect(px+5,py+S*.55,14,12);c.fillRect(px+S-4,py+S*.55,14,12);
  c.fillStyle='#4a2808';c.fillRect(px+S*.5-8,py+S*1.08,16,S*.62);
  c.fillStyle='#ffd700';c.fillRect(px+S*.5+3,py+S*1.22,3,3);

  c.font=`${S*.52}px serif`;c.textAlign='center';c.fillText(h.emoji,px+S*.9,py+S*.35);c.textAlign='left';
}

function drawPlayer(px,py){

//  GAME LOOP
// ═══════════════════════════════════════════════════════════
let tickInterval=null;
let timeFrac=0; // fractional days accumulated

function startTickLoop(){
  if(tickInterval)clearInterval(tickInterval);
  tickInterval=setInterval(gameTick,200);
}

function gameTick(){
  if(!gameRunning||G.paused)return;
  const daysPerTick=G.speed*0.2;
  timeFrac+=daysPerTick;
  while(timeFrac>=1){
    timeFrac-=1;
    advanceDay();
  }
}

function advanceDay(){
  G.day++;
  const dims=[31,28,31,30,31,30,31,31,30,31,30,31];
  const isLeap=(G.year%4===0&&(G.year%100!==0||G.year%400===0));
  const maxDay=G.month===2&&isLeap?29:dims[G.month-1];
  if(G.day>maxDay){G.day=1;G.month++;}
  if(G.month>12){G.month=1;G.year++;onNewYear();}
  // Passive income (daily fraction)
  if(G.passiveIncome>0) G.money+=G.passiveIncome/30;
  // Server passive income
  if(G.items.server) G.money+=Math.round(getPrice('btc',G.year,G.month)*0.0001);
  // Check historical events
  checkEvents();
  // Auto-save every 30 game days
  if(G.day===1||G.day===15)saveGame(true);
  updateHUD();
}

function onNewYear(){
  if(G.year>2026)return;
  const btcNow=Math.round(G.portfolio.btc*getPrice('btc',G.year,G.month));
  const ethNow=Math.round(G.portfolio.eth*getPrice('eth',G.year,G.month));
  const goldNow=Math.round(G.portfolio.gold*getPrice('gold',G.year,G.month));
  toast(`${t('new_year')} ${G.year} 🎆`,'g');
  // Slight inflation on money
  G.money=Math.round(G.money*1.015);
  // Update passive income from businesses
  G.passiveIncome=G.businesses.reduce((a,b)=>a+b.income,0)+(G.items.smarthome?2:0);
}

let pendingEvent=null;
function checkEvents(){
  HIST_EVENTS.forEach(ev=>{
    if(G.firedEvents.has(ev.id))return;
    if(G.year===ev.y&&G.month===ev.m){
      G.firedEvents.add(ev.id);
      fireEvent(ev);
    }
  });
}

function fireEvent(ev){
  const info=ev[lang]||ev.es;
  // Apply market effects
  if(ev.effect){
    Object.keys(ev.effect).forEach(asset=>{
      // Just affects price history context - we show the notification
    });
    // Apply direct portfolio value effect as a one-time thing
    if(ev.effect.btc&&G.portfolio.btc>0){
      const change=Math.round(G.portfolio.btc*getPrice('btc',G.year,G.month)*Math.max(-0.95,ev.effect.btc));
      G.money+=change;
      toast(`₿ ${change>=0?'+':''}€${change}`,change>=0?'b':'r');
    }
    if(ev.effect.eth&&G.portfolio.eth>0){
      const change=Math.round(G.portfolio.eth*getPrice('eth',G.year,G.month)*Math.max(-0.95,ev.effect.eth));
      G.money+=change;
    }
    if(ev.effect.sp500&&G.portfolio.sp500>0){
      const change=Math.round(G.portfolio.sp500*getPrice('sp500',G.year,G.month)*Math.max(-0.95,ev.effect.sp500));
      G.money+=change;
    }
    if(ev.effect.apple&&G.portfolio.apple>0){
      const change=Math.round(G.portfolio.apple*getPrice('apple',G.year,G.month)*Math.max(-0.95,ev.effect.apple));
      G.money+=change;
    }
    if(ev.effect.gold&&G.portfolio.gold>0){
      const change=Math.round(G.portfolio.gold*getPrice('gold',G.year,G.month)*Math.max(-0.95,ev.effect.gold));
      G.money+=change;
    }
  }
  // Log
  G.eventLog.unshift({date:`${G.year}-${String(G.month).padStart(2,'0')}`,title:ev.emoji+' '+info.title,body:info.body});
  if(G.eventLog.length>50)G.eventLog.pop();
  // Show banner
  showBanner(ev.emoji+' '+info.title,info.body);
  updateHUD();
}

const MONTHS_ES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MONTHS_EN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function monthName(m){return (lang==='es'?MONTHS_ES:MONTHS_EN)[m-1]||m;}

function netWorth(){
  let w=G.money;
  w+=G.portfolio.btc*getPrice('btc',G.year,G.month);
  w+=G.portfolio.eth*getPrice('eth',G.year,G.month);
  w+=G.portfolio.gold*getPrice('gold',G.year,G.month);
  w+=G.portfolio.sp500*getPrice('sp500',G.year,G.month);
  w+=G.portfolio.apple*getPrice('apple',G.year,G.month);
  w+=G.portfolio.tesla*getPrice('tesla',G.year,G.month);
  w+=G.portfolio.solana*getPrice('solana',G.year,G.month);
  w+=G.businesses.reduce((a,b)=>a+b.cost,0)*0.8;
  return Math.round(w);
}

function updateHUD(){
  document.getElementById('h-date').textContent=`${G.day} ${monthName(G.month)} ${G.year}`;
  document.getElementById('h-money').textContent='€'+Math.round(G.money).toLocaleString();
  document.getElementById('h-btc').textContent=G.portfolio.btc?G.portfolio.btc.toFixed(4)+' ₿':'0';
  document.getElementById('h-eth').textContent=G.portfolio.eth?G.portfolio.eth.toFixed(3)+' Ξ':'0';
  document.getElementById('h-gold').textContent=G.portfolio.gold?G.portfolio.gold.toFixed(1)+' oz':'0';
  document.getElementById('h-sp500').textContent=G.portfolio.sp500?G.portfolio.sp500.toFixed(2):'0';
  document.getElementById('h-worth').textContent='€'+netWorth().toLocaleString();
  document.getElementById('h-houses').textContent=G.ownedHouses.length+'/'+HOUSES.length;
  for(let i=1;i<=5;i++)document.getElementById('s'+i).classList.toggle('on',i<=G.wanted);
}

function isModalOpen(){return document.getElementById('mo').classList.contains('open');}
function openModal(title,content,btns){
  document.getElementById('mtitle').textContent=title;
  document.getElementById('mcont').innerHTML=content;
  document.getElementById('mload').style.display='none';
  const bd=document.getElementById('mbtns');bd.innerHTML='';
  (btns||[]).forEach(b=>{
    const el=document.createElement('button');
    el.className='bb '+(b.cls||'');
    el.textContent=b.label;
    if(b.disabled)el.disabled=true;
    el.onclick=b.fn;
    bd.appendChild(el);
  });
  document.getElementById('mo').classList.add('open');
}
function closeModal(){document.getElementById('mo').classList.remove('open');}
function setLoad(on){document.getElementById('mload').style.display=on?'block':'none';document.getElementById('mcont').style.opacity=on?.3:1;}
function clearBtns(){document.getElementById('mbtns').innerHTML='';}
function addBtn(label,fn,cls){
  const bd=document.getElementById('mbtns');
  const el=document.createElement('button');el.className='bb '+(cls||'');el.textContent=label;el.onclick=fn;
  bd.appendChild(el);return el;
}
function addOpt(label,fn,cls,disabled){
  const el=document.createElement('button');
  el.className='opt '+(cls||'');el.innerHTML=label;el.onclick=fn;
  if(disabled)el.disabled=true;
  document.getElementById('mcont').appendChild(el);
  return el;
}

async function ai(prompt){
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        messages:[{role:'user',content:prompt}]})
    });
    const d=await r.json();
    return d.content.map(i=>i.text||'').join('');
  }catch(e){return null;}
}

async function doWork(){
  const avail=JOBS.filter(j=>jobAvailable(j));
  const locked=JOBS.filter(j=>!jobAvailable(j)&&j.unlock<=G.year+3);

  openModal(t('work_menu'),`<div style="font-family:'VT323',monospace;font-size:16px;color:#555;margin-bottom:8px">${t('choose_job')} ${monthName(G.month)} ${G.year}:</div>`,[{label:t('cancel'),fn:closeModal}]);

  avail.forEach(job=>{
    let desc='';
    if(job.special==='mine')desc=`BTC @ €${Math.round(getPrice('btc',G.year,G.month)).toLocaleString()}`;
    else if(job.special==='rig_mine')desc='Mining Rig x5 potencia';
    else if(job.special==='trade')desc=lang==='es'?'Arriesgado':'Risky';
    else if(job.special==='influencer')desc=lang==='es'?'Variable':'Variable';
    else if(job.special==='defi')desc='Yield ETH';
    else if(job.special==='server')desc=lang==='es'?'Ingresos pasivos':'Passive income';
    else{const p=getJobPay(job);desc=`€${p[0]}–€${p[1]}`;}
    addOpt(`${job.emoji} ${job[lang]||job.es} <span style="color:#555">— ${desc}</span>`,()=>execJob(job),'g');
  });

  if(locked.length){
    const div=document.createElement('div');
    div.style.cssText='font-family:VT323,monospace;font-size:16px;color:#333;margin-top:8px;';
    div.textContent=lang==='es'?'— Próximamente —':'— Coming soon —';
    document.getElementById('mcont').appendChild(div);
    locked.forEach(job=>{
      addOpt(`${job.emoji} ${job[lang]||job.es} <span style="color:#333">— ${t('unlock_year')} ${job.unlock}</span>`,null,'',true);
    });
  }
}

async function execJob(job){
  document.getElementById('mcont').innerHTML=`<span style="color:#555;font-family:'VT323',monospace;font-size:18px">⚙ Procesando...</span>`;
  setLoad(true);clearBtns();

  // Special jobs
  if(job.special==='mine'||job.special==='rig_mine'){
    const mult=job.special==='rig_mine'?5:1;
    const btcE=parseFloat((Math.random()*0.04*mult+0.003*mult).toFixed(5));
    const eurE=Math.round(btcE*getPrice('btc',G.year,G.month));
    const narr=await ai(`RPG cómico España ${G.year}. El jugador minó ${btcE} BTC (€${eurE}). ${job.special==='rig_mine'?'Tiene un Mining Rig profesional.':''} 3 frases graciosas. Sin asteriscos.`);
    setLoad(false);
    document.getElementById('mcont').innerHTML=narr||`⛏ Minaste ${btcE} BTC (€${eurE})`;
    addBtn(`✅ Cobrar ${btcE} BTC`,()=>{G.portfolio.btc=parseFloat((G.portfolio.btc+btcE).toFixed(5));closeModal();toast(`+${btcE} ₿`,'b');updateHUD();},'g');
    addBtn(t('close'),closeModal);
    return;
  }
  if(job.special==='trade'){
    const win=Math.random()<0.52,pct=Math.random()*0.45+0.05;
    const change=Math.round(G.money*pct*(win?1:-1));
    const narr=await ai(`RPG cómico España ${G.year}. Day trading. ${win?`Ganó €${change}`:`Perdió €${Math.abs(change)}`}. 3 frases. Sin asteriscos.`);
    setLoad(false);
    document.getElementById('mcont').innerHTML=narr||`📈 ${win?'+':'-'}€${Math.abs(change)}`;
    addBtn(`${win?'✅ Cobrar':'😢 Aceptar'} €${Math.abs(change)}`,()=>{G.money+=change;closeModal();toast(`${win?'+':'-'}€${Math.abs(change)}`,win?'g':'r');updateHUD();},'g');
    addBtn(t('close'),closeModal);return;
  }
  if(job.special==='influencer'){
    const followers=Math.pow(10,Math.random()*3+1)|0;
    const earn=Math.floor(followers*(Math.random()*0.1+0.01));
    const narr=await ai(`RPG cómico España ${G.year}. Influencer en redes sociales. ${followers.toLocaleString()} seguidores, ganó €${earn}. 3 frases graciosas. Sin asteriscos.`);
    setLoad(false);
    document.getElementById('mcont').innerHTML=narr||`📱 ${followers.toLocaleString()} seguidores. +€${earn}`;
    addBtn(`✅ Cobrar €${earn}`,()=>{G.money+=earn;closeModal();toast(`+€${earn} 📱`,'g');updateHUD();},'g');
    addBtn(t('close'),closeModal);return;
  }
  if(job.special==='defi'){
    const eth=G.portfolio.eth;
    if(eth<=0){setLoad(false);document.getElementById('mcont').innerHTML=lang==='es'?'No tienes ETH para hacer yield farming.':'You have no ETH for yield farming.';addBtn(t('close'),closeModal);return;}
    const yield_pct=Math.random()*0.12+0.03;
    const earn=parseFloat((eth*yield_pct).toFixed(4));
    const narr=await ai(`RPG cómico ${G.year}. Yield farming DeFi. Tenía ${eth} ETH, ganó ${earn} ETH (${(yield_pct*100).toFixed(1)}% APY). 3 frases. Sin asteriscos.`);
    setLoad(false);
    document.getElementById('mcont').innerHTML=narr||`🌾 Yield: +${earn} ETH`;
    addBtn(`✅ Cobrar ${earn} ETH`,()=>{G.portfolio.eth=parseFloat((G.portfolio.eth+earn).toFixed(4));closeModal();toast(`+${earn} Ξ`,'b');updateHUD();},'g');
    addBtn(t('close'),closeModal);return;
  }
  if(job.special==='server'){
    const daily=Math.round(getPrice('btc',G.year,G.month)*0.0003*30);
    setLoad(false);
    document.getElementById('mcont').innerHTML=`<div style="font-family:'VT323',monospace;font-size:19px">☁️ Tu servidor genera aproximadamente<br><span style="color:#ffd700">€${daily}/mes</span> en ingresos pasivos.<br><br>Ya se está acumulando automáticamente.</div>`;
    addBtn(t('close'),closeModal);return;
  }

  // Normal job
  const pay=getJobPay(job);
  const earn=Math.floor(Math.random()*(pay[1]-pay[0])+pay[0]);
  const narr=await ai(`RPG cómico España ${G.year}. El jugador trabajó de "${job[lang]||job.es}" y ganó €${earn}. 3 frases graciosas con emojis. Sin asteriscos ni markdown.`);
  setLoad(false);
  document.getElementById('mcont').innerHTML=narr||`${job.emoji} Trabajaste duro. +€${earn}`;
  G.totalEarned+=earn;
  addBtn(`✅ ${t('collect')} €${earn}`,()=>{G.money+=earn;closeModal();toast(`+€${earn} 💰`,'');updateHUD();},'g');
  addBtn(t('close'),closeModal);
}

  assets.forEach(a=>{
    const avail=assetAvailable(a.id,G.year,G.month);

      <td class="coin">${p?'€'+p.toLocaleString():lang==='es'?'No disp.':'N/A'}</td>
      <td>${val?'€'+val.toLocaleString():'—'}</td>
      <td class="${chg>0?'up':chg<0?'dn':''}">${chg?(chg>0?'+':'')+chg+'%':'—'}</td></tr>`;
  });
  html+=`</tbody></table>`;
  html+=`<div style="font-family:'VT323',monospace;font-size:16px;color:#555;margin-top:8px">${t('net_worth')}: <span style="color:#ffd700">€${netWorth().toLocaleString()}</span></div>`;

  }
  openModal(t('market_menu'),html,btns);

function openAssetTrade(a,p){
  const qty=G.portfolio[a.id]||0;
  const amts=a.id==='btc'?[0.01,0.1,1,10]:a.id==='eth'?[0.1,1,10,100]:a.id==='solana'?[1,10,100]:a.id==='gold'?[0.1,1,10]:[1,5,20,100];
  let html=`<div style="font-family:VT323,monospace;font-size:20px;color:#ffd700;margin-bottom:8px">${a.name}</div>

async function execCrime(crime){
  document.getElementById('mcont').innerHTML=`<span style="color:#555;font-family:'VT323',monospace;font-size:18px">⚙ Ejecutando...</span>`;
  setLoad(true);clearBtns();
  const adjRisk=crime.risk+G.wanted*0.1;
  const success=Math.random()>adjRisk;
  const earn=success?Math.floor(Math.random()*(crime.reward[1]-crime.reward[0])+crime.reward[0]):0;
  const narr=await ai(`RPG cómico España ${G.year}. El jugador intentó "${crime.label}" y ${success?`consiguió €${earn}`:'fue pillado por la policía'}. 3 frases graciosas. Sin asteriscos.`);
  setLoad(false);
  document.getElementById('mcont').innerHTML=narr||`${success?`✅ +€${earn}`:'🚔 ¡Pillado!'}`;
  clearBtns();
  if(success){
    G.money+=earn;G.wanted=Math.min(5,G.wanted+crime.stars);
    addBtn(`✅ €${earn}`,()=>{closeModal();toast(`+€${earn} 💰`,'');updateHUD();},'r');
  } else {
    G.wanted=Math.min(5,G.wanted+crime.stars+1);
    addBtn(t('accept'),()=>{closeModal();updateHUD();},'r');
  }
  checkArrested();
  updateHUD();
}

function checkArrested(){
  if(G.wanted>=5&&!G.jailed){
    G.jailed=true;
    const fine=Math.min(Math.round(G.money*0.5),10000);
    G.money=Math.max(0,G.money-fine);
    G.wanted=0;
    setTimeout(()=>{
      openModal(t('arrested'),
        `<div style="font-family:VT323,monospace;font-size:22px;color:#ff3333;line-height:1.6">
        ${t('jail_msg')} <span style="color:#ffd700">€${fine.toLocaleString()}</span><br><br>
        ${t('jail_year')}<br><br>

        [{label:lang==='es'?'😔 Cumplir condena':'😔 Serve time',fn:()=>{

          // Advance 1 year
          G.year++;
          closeModal();updateHUD();toast(lang==='es'?`Saliste de la cárcel. ${G.year}`:`Released. ${G.year}`,'r');
        },cls:'r'}]
      );
    },500);

}

// ═══════════════════════════════════════════════════════════
//  GAME MAIN LOOP (canvas)
// ═══════════════════════════════════════════════════════════
function gameFrame(ts){
  const dt=(ts-lastT)/1000;lastT=ts;
  moveDel-=dt;
  if(moveDel<=0&&!isModalOpen()){
    let dx=0,dy=0;
    if(keys['ArrowLeft']||keys['a'])dx=-1;
    else if(keys['ArrowRight']||keys['d'])dx=1;
    else if(keys['ArrowUp']||keys['w'])dy=-1;
    else if(keys['ArrowDown']||keys['s'])dy=1;
    if(dx||dy){const nx=pl.x+dx,ny=pl.y+dy;if(!solid(nx,ny)){pl.x=nx;pl.y=ny;moveDel=.13;}}
    if(keys['e']||keys['E']){keys['e']=false;keys['E']=false;interact();}
  }
  resize();draw(dt);
  requestAnimationFrame(gameFrame);
}
document.addEventListener('keydown',e=>keys[e.key]=true);
document.addEventListener('keyup',e=>keys[e.key]=false);

// Touch
(function(){
  let sx,sy;
  document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
  document.addEventListener('touchend',e=>{
    if(isModalOpen())return;
    const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)<14&&Math.abs(dy)<14)return;
    if(Math.abs(dx)>Math.abs(dy)){const k=dx>0?'ArrowRight':'ArrowLeft';keys[k]=true;setTimeout(()=>keys[k]=false,160);}
    else{const k=dy>0?'ArrowDown':'ArrowUp';keys[k]=true;setTimeout(()=>keys[k]=false,160);}
  },{passive:true});
})();
